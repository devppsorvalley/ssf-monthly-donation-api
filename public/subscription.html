<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSF Subscription Donation</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
    h1 { color: #2b4162; }
    label { display: block; margin: 16px 0 6px; }
    input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #0077cc; color: white; border: none; padding: 12px 18px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #005fa3; }
    .notice { margin: 20px 0; padding: 12px; background: #f2f8ff; border-left: 4px solid #0077cc; }
  </style>
</head>
<body>
  <h1>Subscribe to SSF Monthly Donation</h1>
  <p class="notice">This page uses a shared Razorpay subscription plan. Fill in your name, PAN, phone, and donation amount to start the subscription flow.</p>

  <form id="subscription-form">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required />
    <label for="pan">PAN</label>
    <input id="pan" name="pan" type="text" required placeholder="ABCDE1234F" />
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />
    <label for="contact">Phone</label>
    <input id="contact" name="contact" type="tel" required placeholder="10-digit mobile" />
    <label for="amount">Amount (INR)</label>
    <input id="amount" name="amount" type="number" required min="1" step="1" placeholder="1000" />
    <button type="submit">Donate Monthly</button>
  </form>

  <div id="status"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    async function fetchConfig() {
      const response = await fetch('/api/subscriptions/config');
      return response.json();
    }

    async function createSubscription(payload) {
      const response = await fetch('/api/subscriptions/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return response.json();
    }

    document.getElementById('subscription-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const pan = document.getElementById('pan').value.trim();
      const email = document.getElementById('email').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const amountValue = Number(document.getElementById('amount').value.trim());
      const status = document.getElementById('status');
      status.textContent = 'Creating subscription...';

      try {
        const config = await fetchConfig();
        if (!config.planId && !amountValue) {
          throw new Error('Subscription plan is not configured and no donation amount was provided.');
        }

        const payload = {
          planId: config.planId,
          customer: { name, pan, email, contact },
          amount: Math.round(amountValue * 100),
          totalCount: config.totalCount,
        };

        const data = await createSubscription(payload);
        if (data.error) {
          throw new Error(data.error.description || data.error || 'Failed to create subscription');
        }

        const options = {
          key: config.razorpayKeyId,
          subscription_id: data.subscriptionId,
          name: 'SSF Monthly Donation',
          description: config.description,
          handler: function (response) {
            status.textContent = 'Subscription successful! Thank you for donating.';
          },
          notes: {
            donor_name: name,
            donor_email: email,
            donor_pan: pan,
            donation_amount: amountValue,
          },
          theme: {
            color: '#2b4162'
          }
        };

        const rzp = new Razorpay(options);
        rzp.on('payment.failed', function (response) {
          status.textContent = 'Payment failed. Please try again.';
          console.error(response.error);
        });
        rzp.open();
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
      }
    });
  </script>
</body>
</html>
